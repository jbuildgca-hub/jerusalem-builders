<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ג׳רוזלם בילדרס פרויקטים בע״מ</title>
  <meta name="description" content="מרכז פיקוד — ג׳רוזלם בילדרס פרויקטים בע״מ" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: #F8F6F2;
      color: #1A1714;
      font-family: 'Segoe UI', Arial, sans-serif;
      direction: rtl;
    }
    * { scrollbar-width: thin; scrollbar-color: #C9A84C #E8E5E0; }
    *::-webkit-scrollbar { width: 6px; }
    *::-webkit-scrollbar-track { background: #E8E5E0; }
    *::-webkit-scrollbar-thumb { background: #C9A84C; border-radius: 3px; }
    select option { background: #FFFFFF; color: #1A1714; }
    input, textarea, select {
      color: #1A1714 !important;
      background: #E8E5E0 !important;
    }
    input::placeholder, textarea::placeholder { color: #A09890 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
